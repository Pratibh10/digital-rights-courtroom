<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital Rights Courtroom — A browser-based litigation simulator for EU digital law education.">
    <title>Digital Rights Courtroom</title>
    <link rel="stylesheet" href="css/style.css">
    <noscript>
        <style>
            body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        </style>
    </noscript>
</head>
<body>

    <!-- No-JS fallback -->
    <noscript>
        <div style="text-align: center; padding: 2rem;">
            <h1>Digital Rights Courtroom</h1>
            <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>

    <!-- Decorative Gavel — fixed bottom-left corner -->
    <div class="deco-gavel" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
            <!-- Gavel head -->
            <rect x="30" y="18" width="60" height="22" rx="4" fill="currentColor" opacity="0.12" stroke="currentColor" stroke-width="1" opacity="0.25"/>
            <rect x="34" y="22" width="52" height="14" rx="2" fill="currentColor" opacity="0.06"/>
            <!-- Handle -->
            <rect x="56" y="40" width="8" height="50" rx="3" fill="currentColor" opacity="0.12" stroke="currentColor" stroke-width="1" opacity="0.2"/>
            <!-- Strike plate -->
            <ellipse cx="60" cy="100" rx="35" ry="6" fill="currentColor" opacity="0.08" stroke="currentColor" stroke-width="1" opacity="0.15"/>
            <!-- Decorative scale of justice lines -->
            <line x1="60" y1="8" x2="60" y2="14" stroke="currentColor" stroke-width="1" opacity="0.2"/>
            <line x1="40" y1="10" x2="80" y2="10" stroke="currentColor" stroke-width="1" opacity="0.15"/>
            <circle cx="40" cy="13" r="3" fill="currentColor" opacity="0.1"/>
            <circle cx="80" cy="13" r="3" fill="currentColor" opacity="0.1"/>
        </svg>
    </div>

    <!-- Main App Container -->
    <div id="app">
        <!-- Screens are rendered here by JavaScript -->
    </div>

    <!-- Legal Codex Sidebar -->
    <button class="codex-toggle" id="codex-toggle-btn">
        <span>&#9878;</span> LEGAL CODEX
    </button>
    <aside id="codex-sidebar">
        <div class="codex-header">
            <h2>&#9878; Legal Codex</h2>
            <input type="text" class="codex-search" placeholder="Search articles..." id="codex-search">
        </div>
        <div class="codex-tabs">
            <button class="codex-tab active" data-framework="all">All</button>
            <button class="codex-tab" data-framework="ai-act">AI Act</button>
            <button class="codex-tab" data-framework="gdpr">GDPR</button>
            <button class="codex-tab" data-framework="dsa">DSA</button>
            <button class="codex-tab" data-framework="dma">DMA</button>
        </div>
        <div class="codex-content" id="codex-content">
            <!-- Codex articles rendered here by codex.js -->
            <p class="text-muted" style="padding: 1rem; font-size: 0.85rem;">Codex articles will appear here as cases are loaded.</p>
        </div>
    </aside>

    <!-- Scripts — order matters: data first, then engine, then screens, then codex -->
    <script src="js/data.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/codex.js"></script>
</body>
</html>
